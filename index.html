<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Tree Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
:root{
  --bg:#030a03;--bg2:#061006;--border:rgba(255,255,255,.08);
  --green:#4caf78;--gdark:#2d5a3a;--amber:#f59e0b;--red:#e05252;
  --blue:#5b9bd5;--gold:#d4a853;--brown:#7a5a32;--text:#c0d4b8;--muted:#5a7a5a;
  --font:'Space Mono',monospace;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;font-size:13px;display:flex;flex-direction:column}

@keyframes bannerIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes popUp{0%{opacity:0;transform:translateY(0) scale(.6)}30%{opacity:1;transform:translateY(-14px) scale(1.15)}100%{opacity:0;transform:translateY(-46px) scale(.9)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes flash{from{opacity:.5}to{opacity:0}}

/* ── Overlays ── */
.screen{position:fixed;inset:0;background:rgba(3,10,3,.96);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
.screen.show{display:flex;animation:bannerIn .3s ease}
.card{max-width:540px;width:92%;border:1px solid var(--border);padding:38px 38px;background:var(--bg2);text-align:center}
.title{font-size:22px;font-weight:700;color:var(--green);letter-spacing:4px;margin-bottom:6px}
.sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:24px}
.lineup{display:flex;flex-direction:column;gap:7px;margin-bottom:26px}
.lvrow{display:flex;align-items:center;gap:12px;padding:8px 12px;border:1px solid var(--border);border-radius:4px;text-align:left}
.lvrow.locked{opacity:.4}
.lvrow.current{border-color:var(--green);background:rgba(76,175,120,.06)}
.lv-ic{font-size:20px;flex-shrink:0;width:26px;text-align:center}
.lv-meta{flex:1}
.lv-name{font-size:13px;font-weight:700;color:var(--text)}
.lv-name .lvnum{color:var(--gold);margin-right:6px}
.lv-desc{font-size:10px;color:var(--muted);margin-top:1px}
.lv-rivals{font-size:9px;color:var(--muted);flex-shrink:0}
.btn{background:transparent;border:1px solid var(--gdark);color:var(--green);padding:12px 34px;font-family:var(--font);font-size:13px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(76,175,120,.1);border-color:var(--green)}

/* intro / clear card */
.ic-icon{font-size:46px;margin-bottom:10px}
.ic-lv{font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:4px}
.ic-name{font-size:26px;font-weight:700;margin-bottom:10px}
.ic-goal{font-size:13px;color:var(--text);line-height:1.9;margin-bottom:6px}
.ic-how{font-size:11px;color:var(--muted);line-height:1.9;margin-bottom:24px}
.ic-stat{display:flex;justify-content:center;gap:24px;margin-bottom:22px}
.ic-stat .s-v{font-size:22px;font-weight:700;color:var(--green)}
.ic-stat .s-l{font-size:10px;color:var(--muted)}

/* ── HUD ── */
.hud{height:46px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--border)}
.hud-l{display:flex;align-items:center;gap:14px}
.hud-title{font-size:13px;font-weight:700;color:var(--green);letter-spacing:2px}
.lvl-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:3px;border:1px solid var(--gold);color:var(--gold)}
.hud-path{display:flex;gap:5px}
.pnode{width:24px;height:8px;border-radius:4px;border:1px solid var(--muted);transition:all .4s;display:flex;align-items:center;justify-content:center;font-size:0}
.pnode.done{background:var(--green);border-color:var(--green)}
.pnode.now{border-color:var(--gold);background:var(--gold)}
.hud-r{display:flex;align-items:center;gap:18px}
.hud-score{font-size:13px;font-weight:700;color:var(--gold)}
.hud-score .lbl{font-size:9px;color:var(--muted);font-weight:400;margin-right:4px}

/* ── Stage ── */
.stage{flex:1;position:relative;overflow:hidden}
#game{display:block;width:100%;height:100%}
.stage-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:11px;color:var(--muted);letter-spacing:1px;pointer-events:none}
.stage-hint b{color:var(--green)}
.goal-bar-wrap{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:280px;text-align:center;pointer-events:none}
.goal-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:4px}
.goal-track{height:8px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.goal-fill{height:100%;background:linear-gradient(90deg,var(--gdark),var(--green));border-radius:4px;width:0%;transition:width .15s ease}
.flash-overlay{position:absolute;inset:0;background:var(--green);opacity:0;pointer-events:none}
.flash-overlay.go{animation:flash .4s ease}
</style>
</head>
<body>

<!-- Intro / Level Map -->
<div class="screen show" id="scIntro">
  <div class="card">
    <div class="title">THE TREE ARENA</div>
    <div class="sub" id="introSub">无尽攀登 · 看你能爬到第几轮</div>
    <div class="lineup" id="lineup"></div>
    <div class="ic-stat" id="introBest" style="margin-bottom:20px"></div>
    <button class="btn" id="introStart" onclick="startRun()">开始攀登 →</button>
  </div>
</div>

<!-- Level Intro -->
<div class="screen" id="scLevelIntro">
  <div class="card">
    <div class="ic-icon" id="liIcon">🌰</div>
    <div class="ic-lv" id="liLv">LEVEL 1</div>
    <div class="ic-name" id="liName">破土</div>
    <div class="ic-goal" id="liGoal"></div>
    <div class="ic-how" id="liHow"></div>
    <button class="btn" id="liBtn" onclick="beginPlay()">开始 →</button>
  </div>
</div>

<!-- Round banner (endless) -->
<div class="screen" id="scRound">
  <div class="card" style="text-align:center;cursor:pointer">
    <div class="ic-lv" id="rbLabel">无尽攀登 · ENDLESS</div>
    <div class="ic-icon" id="rbIcon" style="margin:6px 0">🌳</div>
    <div class="ic-name" id="rbNum" style="font-size:34px;color:var(--gold)">第 1 轮</div>
    <div class="ic-name" id="rbMod" style="font-size:16px;margin-top:2px">风和日丽</div>
    <div class="ic-how" id="rbDesc" style="margin-top:8px"></div>
    <div id="rbStart" style="font-size:9px;color:var(--muted);letter-spacing:2px;opacity:.5;margin-top:14px">点击任意处开始</div>
  </div>
</div>

<!-- Run Over (endless) -->
<div class="screen" id="scRunOver">
  <div class="card">
    <div class="ic-icon">🍂</div>
    <div class="ic-lv" id="roLabel">本轮终结 · YOUR RUN</div>
    <div class="ic-name" id="roTitle" style="color:var(--gold)">新芽旅人</div>
    <div class="ic-name" id="roEn" style="font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:-4px">SPROUT</div>
    <div class="ic-how" id="roMsg" style="margin:8px 0 4px"></div>
    <div class="ic-stat">
      <div><div class="s-v" id="roRound">1</div><div class="s-l" id="roRoundL">爬到第几轮</div></div>
      <div><div class="s-v" id="roScore">0</div><div class="s-l" id="roScoreL">本局得分</div></div>
    </div>
    <div class="ic-stat" style="margin-top:-6px">
      <div><div class="s-v" id="roBestR" style="font-size:15px;color:var(--gold)">0</div><div class="s-l" id="roBestRL">最高轮</div></div>
      <div><div class="s-v" id="roBestS" style="font-size:15px;color:var(--gold)">0</div><div class="s-l" id="roBestSL">最高分</div></div>
    </div>
    <div class="ic-how" id="roNext" style="color:var(--green);margin-bottom:20px"></div>
    <button class="btn" id="roAgain" onclick="startRun()">再爬一次 →</button>
  </div>
</div>

<!-- (unused legacy fail card, kept hidden) -->
<div class="screen" id="scFail" style="display:none!important">
  <div class="card">
    <div class="ic-icon">🥀</div>
    <div class="ic-lv" id="faLv">—</div>
    <div class="ic-name" id="faName">—</div>
    <div class="ic-how" id="faMsg"></div>
    <button class="btn" onclick="startRun()">再来 →</button>
  </div>
</div>

<!-- HUD -->
<div class="hud">
  <div class="hud-l">
    <div class="hud-title">THE TREE ARENA</div>
    <div class="lvl-badge" id="lvlBadge">Lv1 破土</div>
  </div>
  <div class="hud-path" id="hudPath"></div>
  <div class="hud-r">
    <div class="hud-score"><span class="lbl" id="scoreLbl">分数</span><span id="hudScore">0</span></div>
  </div>
</div>

<!-- Language toggle (always on top, clickable over menus) -->
<button id="langBtn" onclick="toggleLang()" style="position:fixed;top:11px;right:16px;z-index:900;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:3px;border:1px solid var(--gold);color:var(--gold);background:rgba(3,10,3,.7)">EN</button>

<!-- Stage -->
<div class="stage" id="stage">
  <canvas id="game"></canvas>
  <div class="goal-bar-wrap" id="goalWrap" style="display:none">
    <div class="goal-label" id="goalLabel">破土进度</div>
    <div class="goal-track"><div class="goal-fill" id="goalFill"></div></div>
  </div>
  <div class="stage-hint" id="stageHint"></div>
  <div class="flash-overlay" id="flash"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  i18n — keys are the Chinese source strings; tr() returns EN in english mode
// ═══════════════════════════════════════════════════════
let lang = localStorage.getItem('ta_lang')||'zh';
const EN={
  '破土':'Sprout','够阳光':'Sunlight','荡藤':'Swing','护果':'Defend','夺冠':'Crown',
  '顶破土壤，钻出地面':'Break through the soil','接住飘落的阳光，集满光照':'Catch falling sunlight',
  '荡藤攀爬到目标高度':'Swing up to the target height','打退害虫和对手，守住果实':'Fend off pests & rivals, protect the fruit',
  '击败最强对手，登顶树冠':'Beat the boss, claim the crown','对手 ×':'Rivals ×','独自':'Solo',
  '风和日丽':'Calm','大风':'Windy','虫潮':'Bug Swarm','金阳丰收':'Golden Harvest','贫土':'Barren Soil','狂暴树冠':'Raging Crown',
  '平稳的一轮':'A calm round','够阳光的阳光会被吹偏':'Sunlight drifts in the wind','护果关害虫大量增加':'Far more pests in Defend',
  '够阳光关金阳光更多':'More gold sunlight in Sunlight','破土绿区更小、藤摆更快':'Smaller green zone, faster vines','夺冠关 Boss 更快更凶':'Boss is faster & fiercer',
  '破土进度':'Breakthrough','守住果实 · 撑过 45 秒':'Protect the fruit · 45s','树冠 Boss · 击败它':'Crown Boss · Defeat it',
  '光照能量（目标 ':'Light energy (goal ','攀爬高度（目标 ':'Climb height (goal ','）':')',
  '白线扫到<b>绿区</b>时，点击屏幕 / 空格':'When the line hits the <b>green zone</b>, click / Space',
  '移动鼠标 / <b>A·D</b>·←→ 左右移动，接住<b>阳光</b>':'Move (mouse / <b>A·D</b>·←→) to catch <b>sunlight</b>',
  '荡到<b>弧线顶端</b>（出现"▲ 甩!"）时点击 / 空格 甩藤上爬':'Tap / Space at the <b>top of the arc</b> (▲ SWING!) to climb',
  '移动瞄准、<b>按住可连发</b> —— 优先打<b>害虫</b>和<b>抢果对手</b>，别让它们碰到果实':'Aim with the mouse, <b>hold to fire</b> — shoot <b>pests</b> & <b>rivals</b> before they reach the fruit',
  '<b style="color:#e05252">红光→点格挡</b>　<b style="color:#ffd54a">金光→点反击</b>　看准光圈缩到中心时点击/空格':'<b style="color:#e05252">Red → Block</b>　<b style="color:#ffd54a">Gold → Counter</b>　Tap/Space when the ring meets the center',
  '你':'YOU','甲':'A','乙':'B','敌':'E','金':'G','你 ':'You ','甲 ':'A ',
  '▲ 甩!':'▲ SWING!','▼ 点击！':'▼ TAP!','● 点!':'● TAP!',
  '连击 x':'COMBO x','超车 ':'Overtake ','守住了！':'Survived!','破土！':'Break!','登顶树冠！':'Summit!','光照满了！':'Full Light!','夺冠！':'Crowned!',
  '格挡':'BLOCK','反击':'COUNTER','格挡!':'Block!','反击! -12':'Counter! -12','受伤 -1':'Hurt -1','反击落空':'Miss','太早/太晚':'Too early/late',
  '没踩中绿区':'Missed green','荡到顶端再点!':'Tap at the top!','差一点':'Close!','护盾抵消':'Shield!','金虫！全清':'Gold! Clear','看招！':'Ready!',
  '最终对决 · 点击绿区':'Final Clash · Tap green','最终对决！点击绿区终结它':'Final Clash! Tap the green to finish',
  '击杀 ':'Kills ','果实 ':'Fruit ','终结':'FINAL','阶段 ':'Phase ','起点':'Start','树冠':'Crown','树冠王':'Crown King',
  '对手先到顶了！追上它！':'A rival reached the top! Catch up!',
  '分数':'Score','第 ':'Round ',' 轮':'','难度 ×':'Difficulty ×','本轮天象 · ':'Weather · ',
  '　·　越爬越快':'　·　faster each round','　·　从这里开始攀登':'　·　start climbing here',
  '下个目标：超过第 ':'Next goal: pass round ','🏆 新纪录！爬到了第 ':'🏆 New best! Reached round ',
  '两个对手都先登顶了 —— 你被甩在了最后。':'Both rivals reached the crown first — you came last.',
  '果实被啃光了 —— 没守住。':'The fruit was devoured — you didn\'t hold it.',
  '你倒在了树冠之下 —— 再来一次。':'You fell beneath the crown — try again.',
  '无尽攀登 · 看你能爬到第几轮':'Endless Climb · How high can you go?','开始攀登 →':'Start Climbing →',
  '5 个小游戏循环成一轮，越爬越快、每轮天象不同。失败即结束。':'5 minigames = one round. Faster each round, new weather every time. One fail ends the run.',
  '无尽攀登 · ENDLESS':'ENDLESS CLIMB','点击任意处开始':'Tap anywhere to start',
  '本轮终结 · YOUR RUN':'YOUR RUN','爬到第几轮':'Round reached','本局得分':'Run score','最高轮':'Best round','最高分':'Best score','再爬一次 →':'Climb again →',
};
function tr(s){ return (lang==='en' && EN[s]!==undefined) ? EN[s] : s; }
function setGoal(zh){ G.goalKey=zh; document.getElementById('goalLabel').textContent=tr(zh); }
function setHint(zh){ G.hintKey=zh; document.getElementById('stageHint').innerHTML=tr(zh); }
function toggleLang(){ lang=(lang==='en'?'zh':'en'); try{localStorage.setItem('ta_lang',lang);}catch(e){} applyLang(); }
function applyLang(){
  document.getElementById('langBtn').textContent=(lang==='en'?'中':'EN');
  const set=(id,zh)=>{const e=document.getElementById(id);if(e)e.textContent=tr(zh);};
  set('introSub',tr('无尽攀登 · 看你能爬到第几轮')); set('introStart',tr('开始攀登 →')); set('scoreLbl',tr('分数'));
  set('rbLabel',tr('无尽攀登 · ENDLESS')); set('rbStart',tr('点击任意处开始'));
  set('roLabel',tr('本轮终结 · YOUR RUN')); set('roRoundL',tr('爬到第几轮')); set('roScoreL',tr('本局得分')); set('roBestRL',tr('最高轮')); set('roBestSL',tr('最高分')); set('roAgain',tr('再爬一次 →'));
  if(typeof G!=='undefined'&&G){ renderLineup(); renderHUD(); if(G.goalKey)setGoal(G.goalKey); if(G.hintKey)setHint(G.hintKey); }
}

// ═══════════════════════════════════════════════════════
//  LEVEL LINEUP
// ═══════════════════════════════════════════════════════
const LEVELS=[
  {lv:1,icon:'🌰',name:'破土',type:'breakout',rivals:0,
   goal:'顶破土壤，钻出地面',
   how:'① 屏幕下方有一条<b>力度条</b>，白线左右来回扫\n② 白线扫到<b style="color:#5bd55b">中间绿区</b>时 → 点击屏幕 / 按空格\n③ 命中绿区，嫩芽就往上顶一截；连续命中有连击加成\n顶到地面就通关。（进绿区时会有"▼ 点击！"提示）',
   ready:true},
  {lv:2,icon:'🌱',name:'够阳光',type:'catch',rivals:1,
   goal:'接住飘落的阳光，集满光照',
   how:'移动鼠标（或 <b>A·D</b>、←→）左右移动你的嫩芽，接住飘落的阳光。\n小阳光+1、大阳光+3、金阳光+5；连续接住有连击加成。\n一个对手也在抢，它接走的光你就拿不到。先攒满 20 能量过关。',
   ready:true},
  {lv:3,icon:'🌿',name:'荡藤',type:'swing',rivals:2,
   goal:'荡藤攀爬到目标高度',
   how:'你荡在藤蔓上左右摆动。荡到<b>弧线顶端</b>（出现"▲ 甩!"提示）时点击 / 空格，甩藤往上爬一截。\n越接近顶点甩得越准：Perfect +2、Nice +1、Miss 不动。\n两个对手在右侧竞速攀爬，先爬满 20 高度登顶过关。',
   ready:true},
  {lv:4,icon:'🌸',name:'护果',type:'shoot',rivals:2,
   goal:'打退害虫和对手，守住果实',
   how:'移动鼠标瞄准、点击/拖动射出树籽。\n打<b>害虫</b>(碰果实-5)、<b>抢果对手</b>(更硬，-8)，<b>金虫</b>击中可全屏清场。\n守住果实别让血归零，撑过 45 秒过关；剩余血量越高分越高。',
   ready:true},
  {lv:5,icon:'🌲',name:'夺冠',type:'boss',rivals:1,
   goal:'击败最强对手，登顶树冠',
   how:'和树冠王决斗。看 Boss 的光圈：<b style="color:#e05252">红光出现「格挡」</b>、<b style="color:#ffd54a">金光出现「反击」</b>，在光圈缩到中心圈时点击/空格。\n反击削 Boss 血，格挡失手你掉一颗心(3心)。把 Boss 打到 20% 进入<b>最终对决</b>：点击绿区终结它。\n赢了，你就是树冠之王。',
   ready:true},
];

let G={round:1,level:1,score:0,diff:1,modifier:null,perf:null,
  bestRound:+(localStorage.getItem('ta_bestRound')||0),
  bestScore:+(localStorage.getItem('ta_bestScore')||0)};

// ── Endless: difficulty soft-cap (per ChatGPT: 1 + ln(round)*0.4, never crashes) ──
function gDiff(){ return 1 + Math.log(G.round)*0.4; }   // R1=1.0 R5=1.6 R10=1.9 R20=2.2 R50=2.6
function modId(){ return G.modifier?G.modifier.id:'none'; }

// ── Per-round 天象 Modifier (anti-staleness: same minigame, different conditions) ──
const MODIFIERS=[
  {id:'none',   name:'风和日丽', icon:'🌤', desc:'平稳的一轮'},
  {id:'windy',  name:'大风',     icon:'🌬', desc:'够阳光的阳光会被吹偏'},
  {id:'swarm',  name:'虫潮',     icon:'🐛', desc:'护果关害虫大量增加'},
  {id:'harvest',name:'金阳丰收', icon:'✨', desc:'够阳光关金阳光更多'},
  {id:'barren', name:'贫土',     icon:'🏜', desc:'破土绿区更小、藤摆更快'},
  {id:'rage',   name:'狂暴树冠', icon:'👹', desc:'夺冠关 Boss 更快更凶'},
];
function pickModifier(round){
  if(round<=1) return MODIFIERS[0];                 // first round is calm
  if(Math.random()<0.22) return MODIFIERS[0];
  return MODIFIERS[1+Math.floor(Math.random()*(MODIFIERS.length-1))];
}
// ── End-of-run Title (screenshot-worthy, per ChatGPT) ──
const TITLES=[
  {test:()=>G.round>=12,                       name:'古树之灵',  en:'ANCIENT OAK'},
  {test:()=>G.round>=8,                        name:'风暴树冠',  en:'STORM CROWN'},
  {test:()=>G.perf&&G.perf.bossNoHit&&G.round>=4,name:'无瑕守冠者',en:'FLAWLESS CROWN'},
  {test:()=>G.perf&&G.perf.kills>=40,          name:'荆棘冠军',  en:'THORN CHAMPION'},
  {test:()=>G.perf&&G.perf.sun>=60,            name:'太阳追猎者',en:'SUN CHASER'},
  {test:()=>G.perf&&G.perf.vineCombo>=8,       name:'藤蔓舞者',  en:'VINE DANCER'},
  {test:()=>true,                              name:'新芽旅人',  en:'SPROUT WANDERER'},
];

function show(id){const e=document.getElementById(id);if(e)e.classList.add('show');}

// ── ENDLESS FLOW: Round = Lv1→Lv5; clear all 5 → next round (harder + new 天象); fail = run over ──
function startRun(){
  G.round=1; G.level=1; G.score=0;
  G.perf={sun:0,vineCombo:0,kills:0,fruitMin:100,bossNoHit:true};
  ['scIntro','scRunOver','scFail','scClear','scLevelIntro'].forEach(hide);
  beginRound();
}
function beginRound(){
  G.level=1; G.diff=gDiff(); G.modifier=pickModifier(G.round);
  showRoundBanner(()=>beginPlay());
}
function beginPlay(){
  stopScene();
  const L=LEVELS[G.level-1]; resize();
  if(L.type==='breakout')startBreakout();
  else if(L.type==='catch')startCatch();
  else if(L.type==='swing')startSwing();
  else if(L.type==='shoot')startShoot();
  else if(L.type==='boss')startDuel();
  renderHUD();
}
function levelClear(levelScore){
  G.score+=levelScore;
  document.getElementById('hudScore').textContent=G.score;
  if(G.level<5){ G.level++; setTimeout(()=>beginPlay(),450); }   // next minigame, fast flow
  else { G.round++; beginRound(); }                              // round done → next round
}
function levelFail(msg){ endRun(msg); }
function endRun(msg){
  stopScene();
  const newBestR=G.round>G.bestRound, newBestS=G.score>G.bestScore;
  if(newBestR){ G.bestRound=G.round; try{localStorage.setItem('ta_bestRound',G.round);}catch(e){} }
  if(newBestS){ G.bestScore=G.score; try{localStorage.setItem('ta_bestScore',G.score);}catch(e){} }
  const t=pickTitle();
  document.getElementById('roTitle').textContent=(lang==='en'?t.en:t.name);
  document.getElementById('roEn').textContent=(lang==='en'?t.name:t.en);
  document.getElementById('roRound').textContent=G.round;
  document.getElementById('roScore').textContent=G.score;
  document.getElementById('roBestR').textContent=G.bestRound;
  document.getElementById('roBestS').textContent=G.bestScore;
  document.getElementById('roMsg').textContent=msg||'';
  document.getElementById('roNext').innerHTML = (newBestR&&G.round>1)
    ? tr('🏆 新纪录！爬到了第 ')+G.round+tr(' 轮')
    : tr('下个目标：超过第 ')+G.bestRound+tr(' 轮');
  show('scRunOver');
}
// round banner (auto-advance ~2.4s or click)
function showRoundBanner(onDone){
  const m=G.modifier;
  document.getElementById('rbIcon').textContent = (m&&m.icon)?m.icon:'🌳';
  document.getElementById('rbNum').textContent=tr('第 ')+G.round+tr(' 轮');
  document.getElementById('rbMod').textContent=(m&&m.id!=='none')?(tr('本轮天象 · ')+tr(m.name)):tr('风和日丽');
  document.getElementById('rbDesc').innerHTML=((m&&m.id!=='none')?tr(m.desc)+'<br>':'')+tr('难度 ×')+G.diff.toFixed(2)+(G.round>1?tr('　·　越爬越快'):tr('　·　从这里开始攀登'));
  const el=document.getElementById('scRound'); el.classList.add('show');
  const go=()=>{ clearTimeout(el._rt); el.onclick=null; el.classList.remove('show'); if(onDone)onDone(); };
  el.onclick=go; clearTimeout(el._rt); el._rt=setTimeout(go,2400);
}

// ═══════════════════════════════════════════════════════
//  EFFECTS
// ═══════════════════════════════════════════════════════
let particles=[],popups=[],shake=0;
function burst(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,color});}}
function popup(x,y,text,color){popups.push({x,y,text,color,life:1});}
function flashGreen(){const f=document.getElementById('flash');f.classList.remove('go');void f.offsetWidth;f.classList.add('go');}
function stepEffects(){
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=0.025;});
  particles=particles.filter(p=>p.life>0);
  popups.forEach(p=>p.life-=0.018);
  popups=popups.filter(p=>p.life>0);
  if(shake>0)shake*=0.85;if(shake<0.3)shake=0;
}
function drawEffects(){
  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,3,3);});
  ctx.globalAlpha=1;
  popups.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.font='bold 20px "Space Mono",monospace';ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y-(1-p.life)*40);});
  ctx.globalAlpha=1;ctx.textAlign='left';
}

// ═══════════════════════════════════════════════════════
//  LEVEL 1 — 破土 (timing power meter)
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
//  SCENE SYSTEM (one minigame per level plugs in here)
// ═══════════════════════════════════════════════════════
let scene=null, raf=null, lastT=0, sceneTimers=[];
// scene-scoped timeout: auto-cleared by stopScene so stale callbacks never fire after a level switch
function sceneTimeout(fn,ms){ const id=setTimeout(fn,ms); sceneTimers.push(id); return id; }
function startLoop(){ if(raf==null){ lastT=performance.now(); raf=requestAnimationFrame(loop); } }
function loop(t){
  const dt=Math.min(50,(t||performance.now())-(lastT||t||0)); lastT=t||performance.now();
  if(scene&&scene.update) scene.update(dt);
  stepEffects();
  if(scene&&scene.draw) scene.draw();
  raf=requestAnimationFrame(loop);
}
function stopScene(){
  if(raf!=null){cancelAnimationFrame(raf);raf=null;}
  sceneTimers.forEach(clearTimeout); sceneTimers=[];
  unbindInput(); scene=null;
  particles=[]; popups=[]; shake=0;   // clear leftover fx so they don't bleed into the next scene
}
// generic input dispatch → active scene
function _down(e){ if(scene&&scene.onDown) scene.onDown(e); }
function _move(e){ if(scene&&scene.onMove) scene.onMove(e); }
function _up(e){ if(scene&&scene.onUp) scene.onUp(e); }
function _key(e){ if(scene&&scene.onKey) scene.onKey(e); }
function _keyup(e){ if(scene&&scene.onKeyUp) scene.onKeyUp(e); }
function bindInput(){
  const s=document.getElementById('stage');
  s.addEventListener('pointerdown',_down); s.addEventListener('pointermove',_move);
  // release/cancel on window so holding then dragging off-canvas still clears state (per Codex note)
  window.addEventListener('pointerup',_up); window.addEventListener('pointercancel',_up);
  window.addEventListener('keydown',_key); window.addEventListener('keyup',_keyup);
}
function unbindInput(){
  const s=document.getElementById('stage');
  s.removeEventListener('pointerdown',_down); s.removeEventListener('pointermove',_move);
  window.removeEventListener('pointerup',_up); window.removeEventListener('pointercancel',_up);
  window.removeEventListener('keydown',_key); window.removeEventListener('keyup',_keyup);
}

// ═══════════════════════════════════════════════════════
//  LEVEL 1 — 破土 (timing power meter)
// ═══════════════════════════════════════════════════════
let mg=null;
function startBreakout(){
  document.getElementById('goalWrap').style.display='block';
  document.getElementById('goalLabel').textContent=tr('破土进度');
  document.getElementById('stageHint').innerHTML=tr('白线扫到<b>绿区</b>时，点击屏幕 / 空格');
  const baseHalf=modId()==='barren'?0.16:0.22;
  mg={ progress:0, levelScore:0, meterPos:0.5, meterDir:1, meterSpeed:0.011*G.diff, sweetCenter:0.5, sweetHalf:baseHalf, baseHalf, combo:0, best:0, done:false };
  scene={ update:breakoutUpdate, draw:drawBreakout,
    onDown:()=>meterHit(),
    onKey:(e)=>{ if(e.code==='Space'){ e.preventDefault(); meterHit(); } } };
  bindInput(); startLoop();
}
function breakoutUpdate(){
  if(mg&&!mg.done){
    mg.meterPos+=mg.meterDir*mg.meterSpeed;
    if(mg.meterPos>1){mg.meterPos=1;mg.meterDir=-1;}
    if(mg.meterPos<0){mg.meterPos=0;mg.meterDir=1;}
  }
  document.getElementById('goalFill').style.width=mg.progress+'%';
}
function meterHit(){
  if(!mg||mg.done)return;
  const dist=Math.abs(mg.meterPos-mg.sweetCenter);
  let gain,label,color;
  if(dist<mg.sweetHalf*0.4){gain=22;label='PERFECT';color='#5bd55b';mg.combo++;}
  else if(dist<mg.sweetHalf){gain=14;label='GOOD';color='#4caf78';mg.combo++;}
  else{gain=0;label=tr('差一点');color='#e0a052';mg.combo=0;}
  mg.best=Math.max(mg.best,mg.combo);
  const comboBonus=mg.combo>1?Math.min(mg.combo*2,16):0;
  if(gain>0)gain+=comboBonus*0.4;
  mg.progress=Math.max(0,Math.min(100,mg.progress+gain));
  // score
  const sc=gain>0?Math.round((label==='PERFECT'?100:50)+comboBonus*3):0;
  mg.levelScore+=sc;
  G.score+=sc>0?0:0; // accumulate at clear
  // fx
  const tipY=H-40-(mg.progress/100)*(H-150);
  const cx=W/2;
  if(gain>0){burst(cx,tipY,color,label==='PERFECT'?18:10);shake=label==='PERFECT'?7:3;}
  else{burst(cx,tipY,color,6);shake=4;}
  popup(cx,tipY-20,label+(mg.combo>1&&gain>0?' x'+mg.combo:''),color);
  // difficulty: zone stays CENTERED, shrinks gently, cursor speeds up gradually
  mg.sweetHalf=Math.max(0.10,mg.baseHalf-0.09*(mg.progress/100));
  mg.meterSpeed=(0.011+0.013*(mg.progress/100))*G.diff;
  document.getElementById('hudScore').textContent=G.score+mg.levelScore;
  if(mg.progress>=100&&!mg.done){
    mg.done=true;flashGreen();shake=12;
    burst(cx,tipY,'#5bd55b',40);
    popup(cx,tipY-30,tr('破土！'),'#5bd55b');
    sceneTimeout(()=>{stopScene();levelClear(mg.levelScore+200);},900);
  }
}
function drawBreakout(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  ctx.clearRect(-20,-20,W+40,H+40);
  // sky above surface
  const surfaceY=110;
  const g=ctx.createLinearGradient(0,0,0,surfaceY);
  g.addColorStop(0,'#0a1f0a');g.addColorStop(1,'#071407');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,surfaceY);
  // sun
  ctx.globalAlpha=.5+.2*Math.sin(Date.now()/600);
  ctx.fillStyle='#d4a853';ctx.beginPath();ctx.arc(W/2,46,20,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  // soil with 3 layer bands
  const soilTop=surfaceY;
  const bands=['#2a1d0e','#241808','#1d1306'];
  const bandH=(H-soilTop)/3;
  for(let i=0;i<3;i++){ctx.fillStyle=bands[i];ctx.fillRect(0,soilTop+i*bandH,W,bandH);}
  // surface line
  ctx.strokeStyle='#3a5a2a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,surfaceY);ctx.lineTo(W,surfaceY);ctx.stroke();
  // layer divider lines, brighten as progress passes
  for(let i=1;i<3;i++){const ly=soilTop+i*bandH;const passed=mg.progress>(100-i/3*100);ctx.strokeStyle=passed?'rgba(76,175,120,.3)':'rgba(0,0,0,.4)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();}
  // sprout: grows from bottom up to (progress→surface)
  const cx=W/2;
  const tipY=H-30-(mg.progress/100)*(H-30-surfaceY);
  // stem
  ctx.strokeStyle='#4caf78';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx,H-20);
  // slight wiggle
  ctx.quadraticCurveTo(cx+Math.sin(Date.now()/400)*4,(H-20+tipY)/2,cx,tipY);ctx.stroke();
  // seed/tip
  ctx.fillStyle=mg.progress>=100?'#5bd55b':'#6b4a2a';
  ctx.beginPath();ctx.arc(cx,tipY,8,0,Math.PI*2);ctx.fill();
  if(mg.progress>=100){
    // leaves
    ctx.fillStyle='#5bd55b';
    ctx.beginPath();ctx.ellipse(cx-10,tipY-4,10,5,-0.6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+10,tipY-4,10,5,0.6,0,Math.PI*2);ctx.fill();
  }
  // depth markers
  drawEffects();
  // power meter
  drawMeter();
  ctx.restore();
}
function drawMeter(){
  const mw=Math.min(440,W-80),mx=(W-mw)/2,my=H-82,mh=20;
  const inZone=Math.abs(mg.meterPos-mg.sweetCenter)<mg.sweetHalf;
  // track
  ctx.fillStyle='rgba(255,255,255,.06)';roundRect(mx,my,mw,mh,10);ctx.fill();
  // sweet zone (glows when cursor inside)
  const sx=mx+(mg.sweetCenter-mg.sweetHalf)*mw,sw=mg.sweetHalf*2*mw;
  ctx.save();
  if(inZone&&!mg.done){ctx.shadowColor='#5bd55b';ctx.shadowBlur=22;}
  const sg=ctx.createLinearGradient(sx,0,sx+sw,0);
  sg.addColorStop(0,'rgba(76,175,120,.3)');sg.addColorStop(.5,inZone?'rgba(91,213,91,.9)':'rgba(91,213,91,.6)');sg.addColorStop(1,'rgba(76,175,120,.3)');
  ctx.fillStyle=sg;roundRect(Math.max(mx,sx),my,Math.min(sw,mw),mh,10);ctx.fill();
  ctx.restore();
  // perfect core (lighter center)
  const pcW=mg.sweetHalf*0.8*mw,pcx=mx+mg.sweetCenter*mw-pcW/2;
  ctx.fillStyle='rgba(255,255,255,.35)';roundRect(pcx,my,pcW,mh,5);ctx.fill();
  // cursor
  const curX=mx+mg.meterPos*mw;
  ctx.fillStyle='#fff';ctx.fillRect(curX-2,my-6,4,mh+12);
  ctx.beginPath();ctx.moveTo(curX,my-8);ctx.lineTo(curX-6,my-15);ctx.lineTo(curX+6,my-15);ctx.fill();
  // helper line under meter
  ctx.fillStyle='#5a7a5a';ctx.font='12px "Space Mono",monospace';ctx.textAlign='center';
  ctx.fillText('白线扫到绿区 → 点击 / 空格',W/2,my+mh+24);
  // BIG in-zone cue (teaches timing)
  if(inZone&&!mg.done){
    const pulse=0.55+0.45*Math.abs(Math.sin(Date.now()/110));
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#5bd55b';ctx.font='bold 26px "Space Mono",monospace';
    ctx.fillText(tr('▼ 点击！'),W/2,my-22);
    ctx.globalAlpha=1;
  }
  // combo
  if(mg.combo>1){ctx.fillStyle='#5bd55b';ctx.font='bold 14px "Space Mono",monospace';ctx.fillText(tr('连击 x')+mg.combo,W/2,my-52);}
  ctx.textAlign='left';
}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

// ═══════════════════════════════════════════════════════
//  LEVEL 2 — 够阳光 (catch falling sunlight, 1 rival)
// ═══════════════════════════════════════════════════════
let cg=null;
const CATCH_GOAL=20;
function catchY(){ return H-66; }
function orbVal(o){ return o.type==='gold'?5:o.type==='big'?3:1; }
function startCatch(){
  document.getElementById('goalWrap').style.display='block';
  document.getElementById('goalLabel').textContent=tr('光照能量（目标 ')+CATCH_GOAL+tr('）');
  document.getElementById('stageHint').innerHTML=tr('移动鼠标 / <b>A·D</b>·←→ 左右移动，接住<b>阳光</b>');
  cg={
    you:{x:W*0.55, energy:0, combo:0, best:0, shield:0, speedB:0},
    rival:{x:W*0.3, energy:0, tx:W*0.3, retarget:0, speed:0.16*G.diff},
    orbs:[], spawnT:400, spawnGap:780/G.diff, done:false, levelScore:0,
    keyL:false, keyR:false, t:0, rivalLed:false, msg:'', msgT:0,
    windy:modId()==='windy',
  };
  scene={ update:catchUpdate, draw:drawCatch,
    onMove:(e)=>{ const r=document.getElementById('stage').getBoundingClientRect(); cg.you.x=Math.max(24,Math.min(W-24,e.clientX-r.left)); },
    onKey:(e)=>{ if(e.code==='ArrowLeft'||e.code==='KeyA')cg.keyL=true; if(e.code==='ArrowRight'||e.code==='KeyD')cg.keyR=true; },
    onKeyUp:(e)=>{ if(e.code==='ArrowLeft'||e.code==='KeyA')cg.keyL=false; if(e.code==='ArrowRight'||e.code==='KeyD')cg.keyR=false; } };
  bindInput(); startLoop();
}
function spawnOrb(){
  const r=Math.random();
  const goldP=modId()==='harvest'?0.22:0.08;  // 金阳丰收 → more gold
  const type = r<goldP?'gold' : r<goldP+0.22?'big' : 'small';
  const vy = (type==='small'?2.4 : type==='big'?1.7 : 1.5)*G.diff;
  const vx = cg.windy ? (Math.random()-0.5)*1.6*G.diff : 0;   // 大风 → horizontal drift
  cg.orbs.push({ x:40+Math.random()*(W-80), y:-20, vy, vx, type });
}
function catchUpdate(dt){
  if(cg.done) return;
  const f=dt/16; cg.t+=dt;
  // keyboard move
  const ks=(0.42+cg.you.speedB)*dt;
  if(cg.keyL) cg.you.x=Math.max(24,cg.you.x-ks);
  if(cg.keyR) cg.you.x=Math.min(W-24,cg.you.x+ks);
  // spawn (ramps up)
  cg.spawnT-=dt;
  if(cg.spawnT<=0){ spawnOrb(); cg.spawnT=cg.spawnGap*(0.7+Math.random()*0.6); cg.spawnGap=Math.max(560,cg.spawnGap-7); }
  // rival picks a target (param-driven, not perfect)
  cg.rival.retarget-=dt;
  if(cg.rival.retarget<=0){
    cg.rival.retarget=240+Math.random()*220;
    const cand=cg.orbs.filter(o=>o.y<catchY()-20);
    if(cand.length){
      const r=Math.random(); let pick;
      if(r<0.60) pick=cand.reduce((a,b)=>Math.abs(b.x-cg.rival.x)<Math.abs(a.x-cg.rival.x)?b:a);
      else if(r<0.85) pick=cand.reduce((a,b)=>orbVal(b)>orbVal(a)?b:a);
      else pick=cand[Math.floor(Math.random()*cand.length)];
      cg.rival.tx=pick.x;
    }
  }
  // rubber-band speed: ease when leading, hustle when behind
  let rs=cg.rival.speed;
  if(cg.rival.energy-cg.you.energy>4) rs*=0.6;
  if(cg.you.energy-cg.rival.energy>6) rs*=1.4;
  cg.rival.x+=Math.sign(cg.rival.tx-cg.rival.x)*Math.min(Math.abs(cg.rival.tx-cg.rival.x),rs*dt);
  cg.rival.x=Math.max(24,Math.min(W-24,cg.rival.x));
  // orbs fall + catch resolution
  const cy=catchY();
  for(let i=cg.orbs.length-1;i>=0;i--){
    const o=cg.orbs[i]; o.y+=o.vy*f; if(o.vx){ o.x+=o.vx*f; if(o.x<20||o.x>W-20)o.vx*=-1; }
    if(o.y>=cy){
      const dy=Math.abs(o.x-cg.you.x), dr=Math.abs(o.x-cg.rival.x);
      if(dy<30 && dy<=dr){ catchByYou(o); cg.orbs.splice(i,1); continue; }
      if(dr<28){ cg.rival.energy+=orbVal(o); cg.orbs.splice(i,1); continue; }
      if(o.y>cy+18){ missOrb(o); cg.orbs.splice(i,1); }
    }
  }
  // win
  if(cg.you.energy>=CATCH_GOAL && !cg.done){
    cg.done=true; flashGreen(); shake=10;
    burst(cg.you.x,cy,'#5bd55b',40); popup(cg.you.x,cy-30,tr('光照满了！'),'#5bd55b');
    sceneTimeout(()=>{ stopScene(); levelClear(cg.levelScore+200); },900);
  }
  // rival-leads taunt (no fail — keep racing)
  if(cg.rival.energy>=CATCH_GOAL && !cg.rivalLed){ cg.rivalLed=true; cg.msg=tr('对手先到顶了！追上它！'); cg.msgT=2200; }
  if(cg.msgT>0) cg.msgT-=dt;
  document.getElementById('goalFill').style.width=Math.min(100,cg.you.energy/CATCH_GOAL*100)+'%';
}
function catchByYou(o){
  const v=orbVal(o); cg.you.energy+=v; cg.you.combo++; cg.you.best=Math.max(cg.you.best,cg.you.combo);
  if(G.perf)G.perf.sun+=v;
  if(cg.you.combo===3) cg.you.speedB=0.12;
  if(cg.you.combo===5) cg.you.shield=1;
  const col=o.type==='gold'?'#ffd54a':o.type==='big'?'#ffe08a':'#fff2b0';
  cg.levelScore+=v*20+(cg.you.combo>1?cg.you.combo*5:0);
  burst(o.x,catchY(),col,o.type==='gold'?22:10); shake=o.type==='gold'?6:2;
  popup(o.x,catchY()-18,'+'+v+(cg.you.combo>1?' x'+cg.you.combo:''),col);
  document.getElementById('hudScore').textContent=G.score+cg.levelScore;
}
function missOrb(o){
  if(Math.abs(o.x-cg.you.x)<90){
    if(cg.you.shield){ cg.you.shield=0; popup(o.x,catchY()-18,tr('护盾抵消'),'#5b9bd5'); }
    else { cg.you.combo=0; cg.you.speedB=0; }
  }
}
function drawCatch(){

  const cy=catchY();

  ctx.strokeStyle='#2a4a2a'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,cy+14); ctx.lineTo(W,cy+14); ctx.stroke();
  // landing previews
  cg.orbs.forEach(o=>{
    const gold=o.type==='gold';

    ctx.beginPath(); ctx.moveTo(o.x,o.y); ctx.lineTo(o.x,cy); ctx.stroke(); ctx.setLineDash([]);
    ctx.globalAlpha=0.22; ctx.fillStyle=gold?'#ffd54a':'#9ad0ff';
    ctx.beginPath(); ctx.ellipse(o.x,cy+6,12,4,0,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  });
  // orbs

    for(let a=0;a<6;a++){ const an=a/6*Math.PI*2+cg.t/400; ctx.beginPath(); ctx.moveTo(o.x+Math.cos(an)*(rad+2),o.y+Math.sin(an)*(rad+2)); ctx.lineTo(o.x+Math.cos(an)*(rad+6),o.y+Math.sin(an)*(rad+6)); ctx.stroke(); }
    ctx.globalAlpha=1; if(gold) ctx.restore();
  });
  drawBasket(cg.rival.x,cy,'#d98a8a',tr('甲'),false);

  if(cg.msgT>0){ ctx.globalAlpha=Math.min(1,cg.msgT/400); ctx.fillStyle='#e0a052'; ctx.font='bold 18px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(cg.msg,W/2,92); ctx.textAlign='left'; ctx.globalAlpha=1; }
  ctx.restore();
}
function drawBasket(x,cy,color,label,shield){

  ctx.beginPath(); ctx.moveTo(x,cy+14); ctx.lineTo(x,cy-2); ctx.stroke();

}
function drawRaceBar(){
  const bw=130,bx=20,by=20,bh=9;

// ═══════════════════════════════════════════════════════
//  LEVEL 3 — 荡藤 (swing-to-climb race, 2 rivals)
// ═══════════════════════════════════════════════════════
let sg=null;
const SWING_GOAL=20;
function startSwing(){
  document.getElementById('goalWrap').style.display='block';
  document.getElementById('goalLabel').textContent=tr('攀爬高度（目标 ')+SWING_GOAL+tr('）');
  document.getElementById('stageHint').innerHTML=tr('荡到<b>弧线顶端</b>（出现"▲ 甩!"）时点击 / 空格 甩藤上爬');
  const sMul=G.diff*(modId()==='barren'?1.2:1);
  sg={ height:0, goal:SWING_GOAL, phase:0, speed:0.009*sMul, sMul, combo:0, best:0, levelScore:0, done:false,
    rivals:[{name:tr('甲'),color:'#d98a8a',h:0,t:900,interval:620/G.diff},{name:tr('乙'),color:'#7fa8d4',h:0,t:1050,interval:720/G.diff}],
    msg:'', msgT:0 };
  scene={ update:swingUpdate, draw:drawSwing,
    onDown:()=>swingGrab(),
    onKey:(e)=>{ if(e.code==='Space'){ e.preventDefault(); swingGrab(); } } };
  bindInput(); startLoop();
}
function bobPos(){
  const cx=W*0.4;
  // anchor rises as you climb → you visibly ascend the screen over the level
  const ay=H*0.50 - (sg.height/sg.goal)*(H*0.30), rope=H*0.30, ang=1.0*Math.sin(sg.phase*Math.PI*2);
  return { x:cx+Math.sin(ang)*rope, y:ay+Math.cos(ang)*rope, cx, ay, rope };
}
function swingUpdate(dt){
  if(sg.done) return;
  sg.phase=(sg.phase+sg.speed*(dt/16))%1;
  sg.speed=(0.009+0.007*(sg.height/sg.goal))*sg.sMul;
  sg.rivals.forEach(r=>{
    r.t-=dt;
    if(r.t<=0){
      let iv=r.interval;
      if(sg.height-r.h>3) iv*=0.75;   // behind you → hustle
      if(r.h-sg.height>2) iv*=1.35;   // ahead → ease (rubber-band)
      r.t=iv*(0.8+Math.random()*0.4);
      if(r.h<sg.goal) r.h++;
    }
  });
  // top-2 advance: you only fail if BOTH rivals reach the crown before you
  if(!sg.done && sg.rivals.every(r=>r.h>=sg.goal)){
    sg.done=true;
    sceneTimeout(()=>{ stopScene(); levelFail(tr('两个对手都先登顶了 —— 你被甩在了最后。')); },700);
    return;
  }
  if(sg.msgT>0) sg.msgT-=dt;
  document.getElementById('goalFill').style.width=Math.min(100,sg.height/sg.goal*100)+'%';
}
function swingGrab(){
  if(!sg||sg.done) return;
  const v=Math.abs(Math.cos(sg.phase*Math.PI*2)); // 0 at apex (top of arc), 1 at bottom (fastest)
  let inc,label,color;
  if(v<0.22){ inc=2; label='Perfect!'; color='#5bd55b'; sg.combo++; }
  else if(v<0.55){ inc=1; label='Nice!'; color='#4caf78'; sg.combo++; }   // forgiving: most taps near an apex count
  else{ inc=0; label=tr('荡到顶端再点!'); color='#e0a052'; sg.combo=0; }        // only the fast middle is a miss
  sg.best=Math.max(sg.best,sg.combo); if(G.perf)G.perf.vineCombo=Math.max(G.perf.vineCombo,sg.combo);
  const p=bobPos();
  if(inc>0){
    const before=sg.height;
    sg.height=Math.min(sg.goal,sg.height+inc);
    sg.levelScore+=(inc===2?120:60)+(sg.combo>1?sg.combo*6:0);
    // strong upward "climbed!" feedback: radial burst + upward streaks
    burst(p.x,p.y,color,inc===2?24:14); shake=inc===2?7:4;
    for(let i=0;i<(inc===2?10:6);i++){ particles.push({x:p.x+(Math.random()-0.5)*20,y:p.y,vx:(Math.random()-0.5)*2,vy:-3-Math.random()*4,life:1,color}); }
    sg.rivals.forEach(r=>{ if(before<=r.h && sg.height>r.h){ sg.msg=tr('超车 ')+r.name+'!'; sg.msgT=1400; } });
    document.getElementById('hudScore').textContent=G.score+sg.levelScore;
  } else { shake=4; }
  popup(p.x,p.y-26,(inc===2?'↑ ':inc===1?'↑ ':'')+label+(inc>0&&sg.combo>1?' x'+sg.combo:''),color);
  if(sg.height>=sg.goal && !sg.done){
    sg.done=true; flashGreen(); shake=12; burst(p.x,p.y,'#5bd55b',40); popup(p.x,p.y-30,tr('登顶树冠！'),'#5bd55b');
    sceneTimeout(()=>{ stopScene(); levelClear(sg.levelScore+200); },900);
  }
}
function drawSwing(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  ctx.clearRect(-20,-20,W+40,H+40);
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0a1f12'); g.addColorStop(1,'#061006');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // scrolling rings = ascent feel
  ctx.strokeStyle='rgba(76,175,120,.05)'; ctx.lineWidth=1;
  const off=(Date.now()/20)%60;
  for(let y=-60+off;y<H;y+=60){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W*0.72,y); ctx.stroke(); }
  const b=bobPos();
  // apex release rings (top of each arc)
  const sgn=Math.sign(Math.sin(sg.phase*Math.PI*2));
  const vNow=Math.abs(Math.cos(sg.phase*Math.PI*2));
  [-1,1].forEach(s=>{
    const zx=b.cx+Math.sin(1.0*s)*b.rope, zy=b.ay+Math.cos(1.0*s)*b.rope;
    const near=(sgn===s)&&vNow<0.55;
    ctx.strokeStyle=near?'rgba(91,213,91,.9)':'rgba(76,175,120,.28)';
    ctx.lineWidth=near?3:1.5; ctx.beginPath(); ctx.arc(zx,zy,16,0,Math.PI*2); ctx.stroke();
  });
  // anchor + vine
  ctx.fillStyle='#2d5a3a'; ctx.beginPath(); ctx.arc(b.cx,b.ay,7,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#3a5a2a'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(b.cx,b.ay); ctx.lineTo(b.x,b.y); ctx.stroke();
  // bob (you)
  ctx.save(); ctx.shadowColor='#4caf78'; ctx.shadowBlur=10; ctx.fillStyle='#4caf78';
  ctx.beginPath(); ctx.arc(b.x,b.y,13,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.fillStyle='#0a180a'; ctx.font='bold 11px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(tr('你'),b.x,b.y+4);
  if(vNow<0.55&&!sg.done){ const pulse=.55+.45*Math.abs(Math.sin(Date.now()/100)); ctx.globalAlpha=pulse; ctx.fillStyle='#5bd55b'; ctx.font='bold 22px "Space Mono",monospace'; ctx.fillText(tr('▲ 甩!'),b.x,b.y-30); ctx.globalAlpha=1; }
  drawEffects();
  drawClimbRuler();
  if(sg.combo>1){ ctx.fillStyle='#5bd55b'; ctx.font='bold 15px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(tr('连击 x')+sg.combo,b.cx,H-40); }
  if(sg.msgT>0){ ctx.globalAlpha=Math.min(1,sg.msgT/400); ctx.fillStyle='#ffd54a'; ctx.font='bold 20px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(sg.msg,b.cx,92); ctx.globalAlpha=1; }
  ctx.textAlign='left';
  ctx.restore();
}
function drawClimbRuler(){
  const rx=W*0.82, top=72, bot=H-72, hh=bot-top;
  ctx.strokeStyle='rgba(255,255,255,.1)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(rx,top); ctx.lineTo(rx,bot); ctx.stroke();
  ctx.fillStyle='rgba(212,168,83,.65)'; ctx.font='10px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(tr('树冠'),rx,top-8);
  ctx.fillStyle='rgba(90,122,90,.6)'; ctx.fillText(tr('起点'),rx,bot+16);
  ctx.fillStyle='#c0d4b8'; ctx.font='12px "Space Mono",monospace'; ctx.fillText(sg.height+' / '+sg.goal,rx,top-24);
  const ms=[{name:tr('你'),color:'#4caf78',h:sg.height,off:0},{name:tr('甲'),color:'#d98a8a',h:sg.rivals[0].h,off:-16},{name:tr('乙'),color:'#7fa8d4',h:sg.rivals[1].h,off:16}];
  ms.forEach(m=>{ const y=bot-(Math.min(sg.goal,m.h)/sg.goal)*hh;
    ctx.fillStyle=m.color; ctx.beginPath(); ctx.arc(rx+m.off,y,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0a180a'; ctx.font='bold 8px "Space Mono",monospace'; ctx.fillText(m.name,rx+m.off,y+3); });
  ctx.textAlign='left';
}

// ═══════════════════════════════════════════════════════
//  LEVEL 4 — 护果 (aim + shoot, defend fruit; rivals attack)
// ═══════════════════════════════════════════════════════
let hg=null;
const HG_TIME=45000;
function hgPlayer(){ return { x:W/2, y:H-58 }; }
function startShoot(){
  document.getElementById('goalWrap').style.display='block';
  document.getElementById('goalLabel').textContent=tr('守住果实 · 撑过 45 秒');
  document.getElementById('stageHint').innerHTML=tr('移动瞄准、<b>按住可连发</b> —— 优先打<b>害虫</b>和<b>抢果对手</b>，别让它们碰到果实');
  hg={ fruitHP:100, time:HG_TIME, done:false, levelScore:0,
    aimX:W/2, aimY:H*0.4, bullets:[], enemies:[], spawnT:600,
    spawnGap:(modId()==='swarm'?720:1150)/G.diff,   // 虫潮 → much faster spawns
    cooldown:0, kills:0, t:0, hitFruitFx:0, isFiring:false };
  const aimAt=(e)=>{ const r=document.getElementById('stage').getBoundingClientRect(); hg.aimX=e.clientX-r.left; hg.aimY=e.clientY-r.top; };
  scene={ update:shootUpdate, draw:drawShoot,
    onMove:aimAt,
    onDown:(e)=>{ aimAt(e); hg.isFiring=true; shootFire(); },
    onUp:()=>{ hg.isFiring=false; } };
  bindInput(); startLoop();
}
function shootFire(){
  if(!hg||hg.done||hg.cooldown>0) return;
  const p=hgPlayer(), mx=p.x, my=p.y-22;
  let dx=hg.aimX-mx, dy=hg.aimY-my; const d=Math.hypot(dx,dy)||1; dx/=d; dy/=d;
  hg.bullets.push({ x:mx, y:my, vx:dx*8, vy:dy*8 });
  hg.cooldown=170; burst(mx,my,'#cfe8a0',4);
}
function spawnEnemy(){
  const prog=1-hg.time/HG_TIME; // 0→1 over the level
  const r=Math.random();
  let type;
  if(r<0.06) type='gold';
  else if(r < 0.30+prog*0.28) type='rival';  // more rivals later (capped ~0.58 per balance review)
  else type='pest';
  const fromLeft=Math.random()<0.5;
  const x= type==='gold' ? (fromLeft?-20:W+20) : 30+Math.random()*(W-60);
  const y= type==='gold' ? 60+Math.random()*120 : -20;
  const e={ x, y, type, hp: type==='rival'?2:1 };
  if(type==='gold'){ e.vx=(fromLeft?1:-1)*2.4; e.vy=0; }
  else { e.vx=0; e.vy=0; e.spd=(type==='rival'?0.9:1.4)*G.diff; }
  hg.enemies.push(e);
}
function shootUpdate(dt){
  if(hg.done) return;
  const f=dt/16; hg.t+=dt; hg.time-=dt; hg.cooldown-=dt; if(hg.hitFruitFx>0)hg.hitFruitFx-=dt;
  const p=hgPlayer();
  // time-up wins FIRST (same-frame priority): surviving to 45s shouldn't be stolen by a last-frame hit
  if(hg.time<=0 && !hg.done){
    hg.time=0; hg.done=true; flashGreen(); shake=10;
    popup(p.x,p.y-50,tr('守住了！'),'#5bd55b'); burst(p.x,p.y-26,'#5bd55b',40);
    sceneTimeout(()=>{ stopScene(); levelClear(hg.levelScore+hg.fruitHP*10+200); },900);
    document.getElementById('goalFill').style.width='100%';
    return;
  }
  // hold-to-fire (drag = continuous fire, gated by cooldown)
  if(hg.isFiring && hg.cooldown<=0) shootFire();
  // spawn (ramps up; floor raised per balance review)
  hg.spawnT-=dt;
  if(hg.spawnT<=0){ spawnEnemy(); hg.spawnT=hg.spawnGap*(0.65+Math.random()*0.7); hg.spawnGap=Math.max(modId()==='swarm'?440:650/G.diff,hg.spawnGap-9); }
  // bullets
  for(let i=hg.bullets.length-1;i>=0;i--){ const b=hg.bullets[i]; b.x+=b.vx*f; b.y+=b.vy*f;
    if(b.x<-30||b.x>W+30||b.y<-30||b.y>H+30){ hg.bullets.splice(i,1); } }
  // enemies move toward fruit (gold flies across)
  for(let i=hg.enemies.length-1;i>=0;i--){ const e=hg.enemies[i];
    if(e.type==='gold'){ e.x+=e.vx*f; if(e.x<-40||e.x>W+40){ hg.enemies.splice(i,1); continue; } }
    else { let dx=p.x-e.x, dy=(p.y-26)-e.y; const d=Math.hypot(dx,dy)||1; e.x+=dx/d*e.spd*f; e.y+=dy/d*e.spd*f;
      if(d<30){ // reached fruit → attack
        const dmg= e.type==='rival'?8:5; hg.fruitHP=Math.max(0,hg.fruitHP-dmg); if(G.perf)G.perf.fruitMin=Math.min(G.perf.fruitMin,hg.fruitHP); hg.hitFruitFx=180; shake=5;
        popup(p.x,p.y-44,'-'+dmg,'#e05252'); burst(p.x,p.y-26,'#e05252',8);
        hg.enemies.splice(i,1);
        if(hg.fruitHP<=0 && !hg.done){ hg.done=true; sceneTimeout(()=>{ stopScene(); levelFail(tr('果实被啃光了 —— 没守住。')); },600); }
        continue;
      }
    }
  }
  // bullet vs enemy (killEnemy(gold) can splice many entries → guard against undefined)
  for(let i=hg.enemies.length-1;i>=0;i--){ const e=hg.enemies[i]; if(!e) continue;
    const er=e.type==='rival'?16:e.type==='gold'?13:10;
    for(let j=hg.bullets.length-1;j>=0;j--){ const b=hg.bullets[j];
      if(Math.hypot(b.x-e.x,b.y-e.y)<er+4){ hg.bullets.splice(j,1); e.hp--;
        if(e.hp<=0){ killEnemy(e,i); }
        else { burst(e.x,e.y,'#cfe8a0',5); }
        break;
      }
    }
    if(i>hg.enemies.length) i=hg.enemies.length; // resync after a gold mass-clear
  }
  // (time-up win handled at top of the frame, before damage)
  document.getElementById('goalFill').style.width=Math.min(100,(HG_TIME-hg.time)/HG_TIME*100)+'%';
}
function killEnemy(e,i){
  hg.enemies.splice(i,1); hg.kills++; if(G.perf)G.perf.kills++;
  if(e.type==='gold'){ // gold = clear all pests + big score
    let cleared=0; for(let k=hg.enemies.length-1;k>=0;k--){ if(hg.enemies[k].type!=='gold'){ burst(hg.enemies[k].x,hg.enemies[k].y,'#ffd54a',8); hg.enemies.splice(k,1); cleared++; } }
    hg.levelScore+=200+cleared*20; flashGreen(); shake=8; popup(e.x,e.y-16,tr('金虫！全清'),'#ffd54a');
  } else {
    hg.levelScore+= e.type==='rival'?60:30; popup(e.x,e.y-14,'+'+(e.type==='rival'?60:30), e.type==='rival'?'#d98a8a':'#cfe8a0');
  }
  burst(e.x,e.y, e.type==='rival'?'#d98a8a':e.type==='gold'?'#ffd54a':'#cfe8a0', 12); shake=Math.max(shake,3);
  document.getElementById('hudScore').textContent=G.score+hg.levelScore;
}
function drawShoot(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  ctx.clearRect(-20,-20,W+40,H+40);
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0c1626'); g.addColorStop(1,'#07120a');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const p=hgPlayer();
  // enemies
  hg.enemies.forEach(e=>{
    if(e.type==='gold'){ ctx.save(); ctx.shadowColor='#ffd54a'; ctx.shadowBlur=14; ctx.fillStyle='#ffd54a'; ctx.beginPath(); ctx.arc(e.x,e.y,11,0,Math.PI*2); ctx.fill(); ctx.restore(); ctx.fillStyle='#1a1400'; ctx.font='bold 9px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(tr('金'),e.x,e.y+3); }
    else if(e.type==='rival'){ ctx.fillStyle='#d98a8a'; ctx.beginPath(); ctx.arc(e.x,e.y,15,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#1a0808'; ctx.font='bold 10px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(tr('敌'),e.x,e.y+3); if(e.hp>1){ctx.strokeStyle='#fff';ctx.globalAlpha=.4;ctx.lineWidth=2;ctx.beginPath();ctx.arc(e.x,e.y,18,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;} }
    else { ctx.fillStyle='#b06a4a'; ctx.beginPath(); ctx.arc(e.x,e.y,9,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#7a4a2a'; ctx.lineWidth=1.5; for(let a=0;a<4;a++){const an=a/4*Math.PI*2+hg.t/200; ctx.beginPath(); ctx.moveTo(e.x+Math.cos(an)*9,e.y+Math.sin(an)*9); ctx.lineTo(e.x+Math.cos(an)*13,e.y+Math.sin(an)*13); ctx.stroke();} }
  });
  ctx.textAlign='left';
  // bullets
  ctx.fillStyle='#cfe8a0'; hg.bullets.forEach(b=>{ ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill(); });
  // player tree + fruit
  const shakeF=hg.hitFruitFx>0?(Math.random()-0.5)*4:0;
  ctx.strokeStyle='#3a5a2a'; ctx.lineWidth=8; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(p.x,H); ctx.lineTo(p.x,p.y-8); ctx.stroke();
  ctx.fillStyle=hg.hitFruitFx>0?'#e05252':'#2d5a3a'; ctx.beginPath(); ctx.arc(p.x+shakeF,p.y-26,26,0,Math.PI*2); ctx.fill();
  // fruits dotted on canopy = HP feel
  ctx.fillStyle='#e0683a'; for(let k=0;k<5;k++){ const an=k/5*Math.PI*2; ctx.globalAlpha=hg.fruitHP> k*20?1:.15; ctx.beginPath(); ctx.arc(p.x+Math.cos(an)*14+shakeF,p.y-26+Math.sin(an)*12,4,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1;
  // cannon barrel toward aim
  let dx=hg.aimX-p.x, dy=hg.aimY-(p.y-22); const d=Math.hypot(dx,dy)||1;
  ctx.strokeStyle='#9ad06a'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(p.x,p.y-22); ctx.lineTo(p.x+dx/d*30,(p.y-22)+dy/d*30); ctx.stroke();
  // crosshair
  ctx.strokeStyle='rgba(154,208,106,.7)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(hg.aimX,hg.aimY,10,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hg.aimX-14,hg.aimY); ctx.lineTo(hg.aimX+14,hg.aimY); ctx.moveTo(hg.aimX,hg.aimY-14); ctx.lineTo(hg.aimX,hg.aimY+14); ctx.stroke();
  drawEffects();
  // fruit HP bar
  const bw=160,bx=p.x-bw/2,by=p.y-64;
  ctx.fillStyle='rgba(255,255,255,.08)'; roundRect(bx,by,bw,8,4); ctx.fill();
  ctx.fillStyle=hg.fruitHP>40?'#5bd55b':'#e05252'; roundRect(bx,by,bw*hg.fruitHP/100,8,4); ctx.fill();
  ctx.fillStyle='#c0d4b8'; ctx.font='10px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(tr('果实 ')+Math.round(hg.fruitHP),p.x,by-5); ctx.textAlign='left';
  // timer + kills
  ctx.fillStyle='#c0d4b8'; ctx.font='bold 16px "Space Mono",monospace'; ctx.textAlign='left'; ctx.fillText('⏱ '+Math.ceil(Math.max(0,hg.time)/1000)+'s',20,34);
  ctx.fillStyle='#9ad06a'; ctx.font='12px "Space Mono",monospace'; ctx.fillText(tr('击杀 ')+hg.kills,20,54);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  LEVEL 5 — 夺冠 (boss duel: time blocks/counters → Final Clash)
// ═══════════════════════════════════════════════════════
let dg=null;
const DUEL_PHASES={ 1:{speed:0.013,window:0.16,gold:0.42}, 2:{speed:0.019,window:0.13,gold:0.50}, 3:{speed:0.026,window:0.11,gold:0.62} };
function duelPhase(){ return dg.bossHP>66?1:dg.bossHP>33?2:3; }
function startDuel(){
  document.getElementById('goalWrap').style.display='block';
  document.getElementById('goalLabel').textContent=tr('树冠 Boss · 击败它');
  document.getElementById('stageHint').innerHTML=tr('<b style="color:#e05252">红光→点格挡</b>　<b style="color:#ffd54a">金光→点反击</b>　看准光圈缩到中心时点击/空格');
  dg={ bossHP:100, hearts:3, done:false, levelScore:0, prompt:null, gapT:1100, t:0, msg:tr('看招！'), msgT:1500, hitFx:0, bossFx:0, clash:null, clashDone:false };
  scene={ update:duelUpdate, draw:drawDuel, onDown:()=>duelTap(), onKey:(e)=>{ if(e.code==='Space'){ e.preventDefault(); duelTap(); } } };
  bindInput(); startLoop();
}
function spawnPrompt(){
  const ph=DUEL_PHASES[duelPhase()];
  const rage=modId()==='rage';
  const spd=ph.speed*G.diff*(rage?1.25:1);
  const goldP=ph.gold+(rage?0.12:0);
  dg.prompt={ type: Math.random()<goldP?'gold':'red', p:0, speed:spd, window:ph.window, hit:0.82, resolved:false, fade:0 };
}
function duelHitPlayer(){
  dg.hearts--; dg.hitFx=300; shake=8; if(G.perf)G.perf.bossNoHit=false;
  popup(W/2,H*0.6,tr('受伤 -1'),'#e05252'); burst(W/2,H*0.42,'#e05252',16);
  if(dg.hearts<=0 && !dg.done){ dg.done=true; sceneTimeout(()=>{ stopScene(); levelFail(tr('你倒在了树冠之下 —— 再来一次。')); },800); }
}
function startClash(){ dg.prompt=null; dg.gapT=0; dg.clash={ pos:0, dir:1, speed:0.02*G.diff, sweetC:0.5, sweetH:Math.max(0.10,0.15/Math.sqrt(G.diff)) }; dg.msg=tr('最终对决！点击绿区终结它'); dg.msgT=2200; }
function duelUpdate(dt){
  if(dg.done) return;
  dg.t+=dt; if(dg.msgT>0)dg.msgT-=dt; if(dg.hitFx>0)dg.hitFx-=dt; if(dg.bossFx>0)dg.bossFx-=dt;
  document.getElementById('goalFill').style.width=Math.min(100,(100-dg.bossHP))+'%';
  if(dg.bossHP<=20 && !dg.clash && !dg.clashDone) startClash();
  if(dg.clash){
    dg.clash.pos+=dg.clash.dir*dg.clash.speed*(dt/16);
    if(dg.clash.pos>1){dg.clash.pos=1;dg.clash.dir=-1;} if(dg.clash.pos<0){dg.clash.pos=0;dg.clash.dir=1;}
    return;
  }
  if(!dg.prompt){ dg.gapT-=dt; if(dg.gapT<=0) spawnPrompt(); return; }
  if(!dg.prompt.resolved){
    dg.prompt.p+=dg.prompt.speed*(dt/16);
    if(dg.prompt.p>=1){
      if(dg.prompt.type==='red') duelHitPlayer(); else popup(W/2,H*0.46,tr('反击落空'),'#9a9a8a');
      dg.prompt.resolved=true; dg.prompt.fade=300; dg.gapT=Math.max(480,820-duelPhase()*90);
    }
  } else { dg.prompt.fade-=dt; if(dg.prompt.fade<=0) dg.prompt=null; }
}
function duelTap(){
  if(!dg||dg.done) return;
  if(dg.clash){
    if(Math.abs(dg.clash.pos-dg.clash.sweetC)<dg.clash.sweetH){
      dg.bossHP=0; dg.clash=null; dg.clashDone=true; dg.done=true; flashGreen(); shake=14;
      popup(W/2,H*0.30,tr('夺冠！'),'#5bd55b'); burst(W/2,H*0.3,'#ffd54a',50); dg.levelScore+=400;
      sceneTimeout(()=>{ stopScene(); levelClear(dg.levelScore + dg.hearts*150 + 300); },1100);
    } else { popup(W/2,H*0.62,tr('没踩中绿区'),'#e0a052'); duelHitPlayer(); }
    return;
  }
  if(dg.prompt && !dg.prompt.resolved){
    const d=Math.abs(dg.prompt.p-dg.prompt.hit);
    dg.prompt.resolved=true; dg.prompt.fade=300; dg.gapT=Math.max(480,820-duelPhase()*90);
    if(d<dg.prompt.window){
      if(dg.prompt.type==='red'){ popup(W/2,H*0.46,tr('格挡!'),'#5b9bd5'); burst(W/2,H*0.42,'#5b9bd5',10); shake=3; dg.levelScore+=20; }
      else { dg.bossHP=Math.max(0,dg.bossHP-12); dg.bossFx=240; shake=5; dg.levelScore+=80; popup(W/2,H*0.3,tr('反击! -12'),'#ffd54a'); burst(W/2,H*0.3,'#ffd54a',16); }
    } else {
      if(dg.prompt.type==='red') duelHitPlayer(); else popup(W/2,H*0.46,tr('太早/太晚'),'#e0a052');
    }
  }
}
function drawDuel(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  ctx.clearRect(-20,-20,W+40,H+40);
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#160a14'); g.addColorStop(1,'#07120a');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const cx=W/2, bossY=H*0.26;
  ctx.save(); if(dg.bossFx>0){ctx.shadowColor='#ffd54a';ctx.shadowBlur=22;}
  ctx.fillStyle=dg.hitFx>0?'#3a1414':'#241a2a'; ctx.strokeStyle='#7a5a8a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(cx,bossY,52,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.restore();
  ctx.fillStyle='#d4a853'; for(let k=-2;k<=2;k++){ ctx.beginPath(); ctx.moveTo(cx+k*20,bossY-44); ctx.lineTo(cx+k*20-8,bossY-66); ctx.lineTo(cx+k*20+8,bossY-66); ctx.closePath(); ctx.fill(); }
  ctx.fillStyle='#c0a0d0'; ctx.font='bold 13px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(tr('树冠王'),cx,bossY+5);
  const bw=320,bx=cx-bw/2,by=bossY+74;
  ctx.fillStyle='rgba(255,255,255,.08)'; roundRect(bx,by,bw,12,6); ctx.fill();
  ctx.fillStyle='#b05a7a'; roundRect(bx,by,bw*Math.max(0,dg.bossHP)/100,12,6); ctx.fill();
  ctx.fillStyle='#c0d4b8'; ctx.font='11px "Space Mono",monospace'; ctx.fillText('BOSS  '+Math.round(Math.max(0,dg.bossHP)),cx,by-6);
  if(dg.prompt){
    const col=dg.prompt.type==='red'?'#e05252':'#ffd54a', py=H*0.54, tR=30;
    const ringR=tR+(1-dg.prompt.p)*120, inWin=Math.abs(dg.prompt.p-dg.prompt.hit)<dg.prompt.window && !dg.prompt.resolved;
    ctx.globalAlpha=.5; ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx,py,tR,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
    ctx.strokeStyle=col; ctx.lineWidth=inWin?5:3; if(inWin){ctx.shadowColor=col;ctx.shadowBlur=18;}
    ctx.beginPath(); ctx.arc(cx,py,Math.max(tR,ringR),0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle=col; ctx.font='bold 18px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(dg.prompt.type==='red'?tr('格挡'):tr('反击'),cx,py+6);
    if(inWin){ const pulse=.5+.5*Math.abs(Math.sin(dg.t/80)); ctx.globalAlpha=pulse; ctx.fillStyle=col; ctx.font='bold 20px "Space Mono",monospace'; ctx.fillText(tr('● 点!'),cx,py+tR+34); ctx.globalAlpha=1; }
  }
  if(dg.clash){
    const mw=Math.min(440,W-80),mx=(W-mw)/2,my=H*0.54,mh=22, inZone=Math.abs(dg.clash.pos-dg.clash.sweetC)<dg.clash.sweetH;
    ctx.fillStyle='rgba(255,255,255,.06)'; roundRect(mx,my,mw,mh,11); ctx.fill();
    const sx=mx+(dg.clash.sweetC-dg.clash.sweetH)*mw, sw=dg.clash.sweetH*2*mw;
    if(inZone){ctx.shadowColor='#5bd55b';ctx.shadowBlur=20;} ctx.fillStyle='rgba(91,213,91,.85)'; roundRect(sx,my,sw,mh,11); ctx.fill(); ctx.shadowBlur=0;
    const curX=mx+dg.clash.pos*mw; ctx.fillStyle='#fff'; ctx.fillRect(curX-2,my-6,4,mh+12);
    ctx.fillStyle='#ffd54a'; ctx.font='bold 16px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(tr('最终对决 · 点击绿区'),cx,my-16);
  }
  drawEffects();
  ctx.textAlign='left'; ctx.font='20px "Space Mono",monospace';
  for(let k=0;k<3;k++){ ctx.fillStyle=k<dg.hearts?'#e05252':'rgba(224,82,82,.2)'; ctx.fillText('♥',24+k*26,H-24); }
  ctx.fillStyle='#7a5a8a'; ctx.font='11px "Space Mono",monospace'; ctx.textAlign='right'; ctx.fillText(tr('阶段 ')+(dg.clash?tr('终结'):duelPhase()),W-20,H-24);
  if(dg.msgT>0){ ctx.globalAlpha=Math.min(1,dg.msgT/500); ctx.fillStyle='#ffd54a'; ctx.font='bold 20px "Space Mono",monospace'; ctx.textAlign='center'; ctx.fillText(dg.msg,cx,H*0.74); ctx.globalAlpha=1; }
  ctx.textAlign='left';
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
resize();renderLineup();renderHUD();applyLang();
</script>
